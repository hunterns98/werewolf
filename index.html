<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐺 Ma Sói — Người Chơi</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">

    <!-- ========== JOIN SCREEN ========== -->
    <div id="joinScreenPlayer" class="join-card">
      <h1>🐺 Ma Sói</h1>
      <p class="subtitle">Nhập mã phòng và tên của bạn để vào game</p>
      <input type="text" id="inputRoomCodePlayer" placeholder="Mã phòng (VD: AB12)" />
      <input type="text" id="inputPlayerName" placeholder="Tên của bạn" />
      <button id="btnJoinGame" class="btn-big btn-confirm">🚪 Vào phòng</button>
    </div>

    <!-- ========== GAME SCREEN ========== -->
    <div id="gameScreenPlayer" class="hidden">

      <div id="statusBar" class="status-bar alive">🟢 Đang kết nối...</div>
      <div id="phaseInfoPlayer" class="phase-info">⏳ Đang chờ...</div>

      <!-- Timer display -->
      <div id="playerTimerDisplay" class="timer-display hidden"></div>

      <!-- WIN BANNER -->
      <div id="winBannerPlayer" class="hidden"></div>

      <!-- ROLE CARD -->
      <div id="roleCard" class="role-card">
        <p>⏳ Đang chờ Admin bắt đầu game...</p>
      </div>

      <!-- NIGHT ACTION (Player Action Mode — chỉ hiện khi Admin bật chế độ "Người chơi tự bấm") -->
      <div id="nightActionPlayer" class="panel hidden"></div>

      <!-- HUNTER PULL (chỉ hiện cho Thợ Săn vừa chết, ở chế độ Player Action Mode) -->
      <div id="hunterPullPlayer" class="panel hidden"></div>

      <!-- LOVER INFO -->
      <div id="loverInfoSection" class="panel hidden"></div>

      <!-- SEER HISTORY (chỉ hiện cho Tiên Tri) -->
      <div id="seerHistorySection" class="panel hidden"></div>

      <!-- ALIVE PLAYER LIST -->
      <div class="panel">
        <div id="aliveListPlayer"></div>
      </div>

      <!-- VOTING AREA (ban ngày, còn sống) -->
      <div id="votingArea" class="panel hidden"></div>

      <!-- WOLF CHAT (chỉ Sói thấy, ban đêm) -->
      <div id="wolfChatSection" class="panel hidden">
        <h3>🐺 Sói Chat (chỉ Sói thấy)</h3>
        <div class="chat-messages" id="wolfChatMessages"></div>
        <div class="chat-input-row">
          <input type="text" id="wolfChatInput" placeholder="Nhắn tin với đồng đội sói..." />
          <button id="wolfChatSend" class="btn-send">Gửi</button>
        </div>
      </div>

      <!-- LOVER CHAT -->
      <div id="loverChatSection" class="panel hidden">
        <h3>💞 Cặp Đôi Chat (chỉ 2 người yêu thấy)</h3>
        <div class="chat-messages" id="loverChatMessages"></div>
        <div class="chat-input-row">
          <input type="text" id="loverChatInput" placeholder="Nhắn tin người yêu..." />
          <button id="loverChatSend" class="btn-send">Gửi</button>
        </div>
      </div>

      <!-- DEBUG REVEAL -->
      <div id="debugRevealSection" class="panel hidden"></div>

      <!-- LOG CÔNG KHAI -->
      <div class="panel">
        <h3>📜 Diễn biến game</h3>
        <div id="logPanelPlayer" class="log-panel"></div>
      </div>

      <!-- END GAME: ROLE REVEAL (mở khóa khi game kết thúc) -->
      <div id="endGameRevealSection" class="panel hidden"></div>

      <!-- END GAME: FULL TIMELINE REVEAL (mở khóa khi game kết thúc) -->
      <div id="timelineRevealSection" class="panel hidden"></div>

    </div>

    <!-- DEATH OVERLAY -->
    <div id="deathOverlay" class="death-overlay hidden">
      <h1>💀 YOU ARE DEAD</h1>
      <p>Bạn đã chết. Hãy tiếp tục theo dõi trong im lặng...</p>
    </div>

  </div>
  <script type="module" src="player.js"></script>
</body>
</html>
